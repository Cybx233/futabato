name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: 提取版本号
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: 打包扩展
        run: |
          cd extension
          zip -r ../futabato-v${{ steps.version.outputs.version }}.zip .

      - name: 创建 Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.version.outputs.version }}
          files: futabato-v${{ steps.version.outputs.version }}.zip
          generate_release_notes: true
